version: "3.9"

services:
  mongodb:
    image: mongo:6-jammy
    container_name: lsjlove-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ai-kupidon-v2-postgres
    restart: always
    environment:
      - POSTGRES_DB=ai_kupidon_v2
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_v2_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_kupidon_v2"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-kupidon-v2-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_v2_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lsjlove-api
    restart: always
    command: "uvicorn --factory app.application.api.main:create_app --host 0.0.0.0 --port 8000"
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-net
    expose:
      - "8000"

  core_v2_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-kupidon-v2-api
    restart: always
    command: "uvicorn core_v2.backend.main:app --host 0.0.0.0 --port 8100"
    env_file:
      - .env.v2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  core_v2_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-kupidon-v2-bot
    restart: always
    command: "python -m core_v2.bot.main"
    env_file:
      - .env.v2
    depends_on:
      core_v2_api:
        condition: service_healthy
    networks:
      - app-net

  core_v2_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-kupidon-v2-worker
    restart: always
    command: "celery -A core_v2.workers.celery_app:celery_app worker -l INFO"
    env_file:
      - .env.v2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lsjlove-frontend
    restart: always
    environment:
      - BACKEND_URL=https://lsjlove.duckdns.org
    networks:
      - app-net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: lsjlove-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_data:/var/www/certbot
    depends_on:
      - api
      - frontend
    networks:
      - app-net

  certbot:
    image: certbot/certbot
    container_name: lsjlove-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  mongodb_data:
  postgres_v2_data:
  redis_v2_data:
  certbot_data:

networks:
  app-net:
    driver: bridge
